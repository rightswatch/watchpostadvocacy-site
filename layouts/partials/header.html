<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo">
      <span class="site-logo__mark" aria-hidden="true">W</span>
      <span class="site-logo__name">WatchPost Advocacy</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.site-nav').classList.toggle('open')">&#9776;</button>
    <nav class="site-nav" aria-label="Main navigation">
      {{- range .Site.Menus.main }}
      <a href="{{ .URL }}"{{- if eq $.RelPermalink .URL }} class="active"{{- end }}>{{ .Name }}</a>
      {{- end }}
    </nav>
    <div class="header-cta"><a href="/about/">About</a></div>
  </div>
</header>
