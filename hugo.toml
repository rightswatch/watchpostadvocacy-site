baseURL = "https://watchpostadvocacy.com/"
languageCode = "en-us"
title = "WatchPost Advocacy"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
enableEmoji = false

[params]
  env = "production"
  title = "WatchPost Advocacy"
  description = "Know your legal rights. WatchPost Advocacy publishes plain-language resources for mesothelioma and Title IX survivors."
  author = "Rights Watch Media Group LLC"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = true
  TocOpen = true
  disableSpecial1stPost = true
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    name = "Your Rights"
    url = "/rights/"
    weight = 20
  [[menu.main]]
    name = "Resources"
    url = "/resources/"
    weight = 30
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"

[outputs]
  home = ["HTML", "RSS", "JSON"]
